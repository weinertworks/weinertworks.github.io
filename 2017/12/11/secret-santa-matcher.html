            <h1 class="post-title p-name" itemprop="name headline">Secret Santa Matcher</h1>
            <p class="post-meta">
              <time class="dt-published" datetime="2017-12-11T22:24:50-06:00" itemprop="datePublished">
                Dec 11, 2017
              </time>• <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">Jim</span></span></p>
          </header>
          <div class="post-content e-content" itemprop="articleBody">
            <p>Written while watching tv for Phoebe’s work’s secret Santa. Recorded for next year.</p>
            <figure class="highlight">
              <pre><code class="language-javascript" data-lang="javascript"><span class="kd">function</span> <span class="nx">secretSantaMatchMaker</span><span class="p">(</span><span class="nx">people</span><span class="p">)</span> <span class="p">{</span>
  <span class="kd">let</span> <span class="nx">unmatched</span> <span class="o">=</span> <span class="nx">people</span><span class="p">.</span><span class="nx">slice</span><span class="p">(),</span>
    <span class="nx">pairs</span> <span class="o">=</span> <span class="p">{};</span>

  <span class="k">for</span><span class="p">(</span><span class="kd">let</span> <span class="nx">i</span> <span class="o">=</span> <span class="mi">0</span><span class="p">;</span> <span class="nx">i</span> <span class="o">&lt;</span> <span class="nx">people</span><span class="p">.</span><span class="nx">length</span><span class="p">;</span> <span class="nx">i</span><span class="o">++</span><span class="p">)</span> <span class="p">{</span>
    <span class="kd">let</span> <span class="nx">giver</span> <span class="o">=</span> <span class="nx">people</span><span class="p">[</span><span class="nx">i</span><span class="p">],</span>
      <span class="nx">idx</span><span class="p">,</span>
      <span class="nx">receiver</span><span class="p">;</span>

    <span class="c1">// Don't let a person end up with their own name</span>
    <span class="c1">// Do you see the bug in this code? It won't happen often</span>
    <span class="k">do</span> <span class="p">{</span>
      <span class="nx">idx</span> <span class="o">=</span> <span class="nb">Math</span><span class="p">.</span><span class="nx">floor</span><span class="p">(</span><span class="nb">Math</span><span class="p">.</span><span class="nx">random</span><span class="p">()</span> <span class="o">*</span> <span class="nx">unmatched</span><span class="p">.</span><span class="nx">length</span><span class="p">);</span>
      <span class="nx">receiver</span> <span class="o">=</span> <span class="nx">unmatched</span><span class="p">[</span><span class="nx">idx</span><span class="p">];</span>
    <span class="p">}</span> <span class="k">while</span><span class="p">(</span><span class="nx">giver</span> <span class="o">===</span> <span class="nx">receiver</span><span class="p">)</span>

    <span class="nx">unmatched</span><span class="p">.</span><span class="nx">splice</span><span class="p">(</span><span class="nx">idx</span><span class="p">,</span> <span class="mi">1</span><span class="p">);</span>
    <span class="nx">pairs</span><span class="p">[</span><span class="nx">giver</span><span class="p">]</span> <span class="o">=</span> <span class="nx">receiver</span>
  <span class="p">}</span>

  <span class="k">return</span> <span class="nx">pairs</span><span class="p">;</span>
<span class="p">}</span>

<span class="kd">let</span> <span class="nx">people</span> <span class="o">=</span> <span class="p">[</span>
  <span class="dl">'</span><span class="s1">Meghan</span><span class="dl">'</span><span class="p">,</span>
  <span class="dl">'</span><span class="s1">Norbert</span><span class="dl">'</span><span class="p">,</span>
  <span class="dl">'</span><span class="s1">Nyasia</span><span class="dl">'</span><span class="p">,</span>
  <span class="dl">'</span><span class="s1">Elizabeth</span><span class="dl">'</span><span class="p">,</span>
  <span class="dl">'</span><span class="s1">Mariam</span><span class="dl">'</span><span class="p">,</span>
  <span class="dl">'</span><span class="s1">Lindsay</span><span class="dl">'</span><span class="p">,</span>
  <span class="dl">'</span><span class="s1">Jeff</span><span class="dl">'</span><span class="p">,</span>
  <span class="dl">'</span><span class="s1">Phoebe</span><span class="dl">'</span><span class="p">,</span>
<span class="p">];</span>

<span class="nx">secretSantaMatchMaker</span><span class="p">(</span><span class="nx">people</span><span class="p">);</span></code></pre>
